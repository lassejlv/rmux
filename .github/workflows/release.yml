name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check formatting
        run: cargo fmt --check
      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Run Rust tests
        # libtermy's Unix PTYs use process-wide SIGCHLD delivery, so tests that
        # own terminals must not compete for child-exit notifications.
        run: cargo test --locked -- --test-threads=1
      - name: Check CLI startup
        run: cargo run --locked -- --help
      - name: Run detach/attach smoke test
        run: ./scripts/smoke-detach-attach.sh
      - name: Test npm installer checksum verification
        run: node --test npm/install.test.js

  build:
    name: Build ${{ matrix.asset }}
    needs: validate
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: rmux-darwin-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset: rmux-darwin-x64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: rmux-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: rmux-linux-arm64
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/rmux ${{ matrix.asset }}
      - name: Generate checksum
        run: shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  publish-npm:
    name: Publish npm package
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Sync package version with tag
        run: npm version --allow-same-version --no-git-tag-version "${GITHUB_REF_NAME#v}"
        working-directory: npm
      - name: Publish
        run: npm publish --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
