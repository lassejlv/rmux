name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check formatting
        run: cargo fmt --check
      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Run Rust tests
        run: cargo test --locked
      - name: Check CLI startup
        run: cargo run --locked -- --help
      - name: Run detach/attach smoke test
        run: ./scripts/smoke-detach-attach.sh
      - name: Test npm installer checksum verification
        run: node --test npm/install.test.js
